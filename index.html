<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our WhatsApp Group Memories</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    text-align:center;
    margin:0;
}
h1{
    background:#25D366;
    color:white;
    padding:20px;
}
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    padding:20px;
}
.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,.3);
}
.message{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
    font-size:24px;
    color:#0a7d2c;
    font-weight:bold;
}
</style>

</head>
<body>

<h1>📸 Our WhatsApp Group Memories</h1>

<div class="gallery">
    <img src="group1.jpg" alt="Group Photo 1">
    <img src="group2.jpg" alt="Group Photo 2">
    <img src="group3.jpg" alt="Group Photo 3">
    <img src="messi.jpg" alt="Messi">
</div>

<div class="message">
😂 Imagine if Messi lifted the 2026 World Cup!<br><br>
This page is just for fun! 💙🤍
</div>

</body>
</html>
